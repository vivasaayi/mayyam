name: Build and Push Backend Base Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/Cargo.toml'
      - 'backend/Cargo.lock'
      - '.github/workflows/docker-base-image.yml'
      - 'Dockerfile.base'
  workflow_dispatch:

jobs:
  build-base-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v5

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3.12.0

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}/mayyam-backend-base
        tags: |
          type=raw,value=latest

    - name: Build and push base image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile.base
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha,scope=backend-base
        cache-to: type=gha,mode=max,scope=backend-base
